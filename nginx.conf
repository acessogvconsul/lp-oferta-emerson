server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Assets com hash no nome: cache imutável de 1 ano
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Todas as rotas caem no index.html (React Router client-side)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
